<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alemla Jamir – Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f5f0e8;
      --dark: #1a1410;
      --warm: #c8a96e;
      --muted: #7a6f63;
      --border: #e0d8cc;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 80% 20%, rgba(200,169,110,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 10% 90%, rgba(200,169,110,0.08) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 2px;
      max-width: 420px;
      width: 100%;
      padding: 3rem 2.5rem 2.5rem;
      box-shadow: 0 2px 40px rgba(26,20,16,0.08), 0 0 0 4px var(--cream), 0 0 0 5px var(--border);
      animation: fadeUp 0.7s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .label {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--warm);
      font-weight: 500;
      margin-bottom: 1.2rem;
    }

    .name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 7vw, 2.6rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--dark);
      margin-bottom: 0.3rem;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: var(--warm);
      margin: 1.4rem 0;
    }

    .contact-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      animation: fadeUp 0.7s ease both;
    }

    .contact-item:nth-child(1) { animation-delay: 0.15s; }
    .contact-item:nth-child(2) { animation-delay: 0.25s; }
    .contact-item:nth-child(3) { animation-delay: 0.35s; }

    .icon {
      flex-shrink: 0;
      width: 38px;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--warm);
    }

    .icon svg {
      width: 16px;
      height: 16px;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .contact-type {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }

    .contact-value {
      font-size: 0.95rem;
      font-weight: 400;
      color: var(--dark);
    }

    .contact-value a {
      color: var(--dark);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s, color 0.2s;
    }

    .contact-value a:hover {
      color: var(--warm);
      border-color: var(--warm);
    }

    .actions {
      margin-top: 2rem;
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      min-width: 120px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.7rem 1.2rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      border-radius: 2px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--dark);
      color: var(--cream);
      border: 1px solid var(--dark);
    }

    .btn-primary:hover {
      background: var(--warm);
      border-color: var(--warm);
      color: #fff;
    }

    .btn-secondary {
      background: transparent;
      color: var(--dark);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      border-color: var(--warm);
      color: var(--warm);
    }

    .btn svg {
      width: 14px;
      height: 14px;
    }

    footer {
      position: relative;
      z-index: 1;
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }
  </style>
</head>
